<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Celebrities — Add your names</title>
  <style>
    :root { --bg:#120a24; --surface:#1e1440; --surface2:#2a1c55; --border:#3a2a6b; --gold:#ffcf4d; --text:#f2edff; --dim:#a99fd0; --a:#4dd0e1; --b:#ff6ec7; --good:#5ad17a; --warn:#ff9a9a; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; padding:20px; max-width:520px; margin:0 auto; }
    h1 { font-size:28px; margin:8px 0 2px; }
    .dim { color:var(--dim); font-size:14px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px; margin-top:16px; }
    label { display:block; font-weight:700; margin:6px 0; }
    input { width:100%; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:10px; padding:12px; font-size:16px; margin-bottom:8px; }
    input.bad { border-color:var(--warn); }
    .teams { display:flex; gap:10px; }
    .team { flex:1; text-align:center; padding:12px; border-radius:12px; border:2px solid var(--border); background:var(--surface2); font-weight:800; cursor:pointer; }
    .team.sel-a { border-color:var(--a); color:var(--a); }
    .team.sel-b { border-color:var(--b); color:var(--b); }
    button.add, .link { background:transparent; color:var(--dim); border:none; text-decoration:underline; font-size:13px; padding:4px; cursor:pointer; }
    button.submit { width:100%; background:var(--gold); color:#231600; border:none; border-radius:14px; padding:16px; font-size:18px; font-weight:800; margin-top:16px; }
    button.submit:disabled { opacity:.4; }
    .big { color:var(--gold); font-size:24px; font-weight:900; }
    .ok { text-align:center; padding:40px 0; }
    .theme { color:var(--gold); font-weight:900; font-size:22px; text-align:center; margin-bottom:8px; }
    .chiprow { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin:-4px 0 10px; }
    .chip { background:var(--surface2); border:1px solid var(--border); border-radius:999px; padding:5px 11px; font-size:13px; color:var(--text); cursor:pointer; font-weight:600; }
    .note { color:var(--dim); font-size:12px; }
    .warn { color:var(--warn); font-size:12px; margin:-4px 0 8px; }
    .helper { display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .descbox { border:1px solid var(--border); border-radius:12px; padding:12px; margin-top:10px; }
    .descrow { display:flex; gap:8px; align-items:flex-start; }
    .descrow input { margin-bottom:0; }
    button.find { background:var(--a); color:#04232a; border:none; border-radius:10px; padding:10px 18px; font-weight:800; cursor:pointer; font-size:15px; }
    button.find:disabled { opacity:.5; }
    button.find.alt { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
    .fieldrow { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .fieldrow input { margin-bottom:0; }
    .thumb { width:40px; height:40px; flex:0 0 40px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--dim); background-size:cover; background-position:center; }
    .thumb.has { border-color:var(--a); }
    summary { cursor:pointer; font-weight:800; color:var(--gold); font-size:15px; }
    details p { margin:6px 0; }
    .zoomov { position:fixed; inset:0; background:rgba(0,0,0,.92); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px; z-index:100; }
    .zoomimg { max-width:100%; max-height:55vh; border-radius:12px; }
    .zoomname { color:var(--text); font-size:26px; font-weight:900; text-align:center; }
    .zoomov button { width:100%; max-width:340px; }
  </style>
</head>
<body>
  <div id="app">
    <h1>🎭 Celebrities</h1>
    <div class="dim">Add your celebrities. They go straight into the game — nobody sees who submitted what.</div>
    <div id="form-wrap"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ---- SAME Firebase web config as the app (src/firebaseConfig.ts) ----
    const firebaseConfig = {
      apiKey: 'AIzaSyAbfglvUhYNKBSbJbrweFJbJ57H9sennFI',
      authDomain: 'celebrities-8f17a.firebaseapp.com',
      projectId: 'celebrities-8f17a',
      storageBucket: 'celebrities-8f17a.firebasestorage.app',
      messagingSenderId: '238175234466',
      appId: '1:238175234466:web:6c9f00fba0ba42e1f8eafb',
    };
    const db = getFirestore(initializeApp(firebaseConfig));
    const params = new URLSearchParams(location.search);
    const room = params.get('room');
    const childMode = params.get('kid') === '1'; // host flags kid games → run photo search
    const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    const teamAName = esc(params.get('a') || 'Team 1'); // real team names passed from the host's QR
    const teamBName = esc(params.get('b') || 'Team 2');
    const wrap = document.getElementById('form-wrap');

    // ---------- Name helpers (ported from the app) ----------
    const CELEBRITY_BANK = [
      'Tom Hanks','Meryl Streep','Denzel Washington','Julia Roberts','Leonardo DiCaprio',
      'Scarlett Johansson','Brad Pitt','Jennifer Lawrence','Will Smith','Morgan Freeman',
      'Robert Downey Jr.','Emma Watson','Johnny Depp','Angelina Jolie','Keanu Reeves',
      'Dwayne Johnson','Ryan Reynolds','Sandra Bullock','Tom Cruise','Anne Hathaway',
      'Chris Hemsworth','Zendaya','Samuel L. Jackson','Nicole Kidman','Hugh Jackman',
      'Beyoncé','Taylor Swift','Michael Jackson','Adele','Elvis Presley',
      'Rihanna','Drake','Lady Gaga','Ed Sheeran','Bruno Mars',
      'Freddie Mercury','Madonna','Bob Marley','Ariana Grande','Billie Eilish',
      'Elton John','Bruce Springsteen','Dolly Parton','Justin Bieber','Snoop Dogg',
      'Paul McCartney','Stevie Wonder','Whitney Houston','Prince','Post Malone',
      'Michael Jordan','Serena Williams','LeBron James','Lionel Messi','Cristiano Ronaldo',
      'Muhammad Ali','Tiger Woods','Usain Bolt','Tom Brady','Simone Biles',
      'Roger Federer','Kobe Bryant','Shaquille O’Neal','Wayne Gretzky','Babe Ruth',
      'Abraham Lincoln','Albert Einstein','Martin Luther King Jr.','Nelson Mandela','Winston Churchill',
      'Barack Obama','Queen Elizabeth II','Mahatma Gandhi','George Washington','Cleopatra',
      'Benjamin Franklin','Theodore Roosevelt','Napoleon Bonaparte','Julius Caesar','Marie Curie',
      'Oprah Winfrey','Walt Disney','Steve Jobs','Bill Gates','Elon Musk',
      'Ellen DeGeneres','Jimmy Fallon','Gordon Ramsay','David Attenborough','Stephen King',
      'Mark Zuckerberg','Jeff Bezos','Kim Kardashian','Mr. Beast','Taylor Lautner',
      'Mickey Mouse','Batman','Spider-Man','Harry Potter','Darth Vader',
      'Homer Simpson','SpongeBob SquarePants','Superman','Yoda','Shrek',
      'Elsa','Wonder Woman','James Bond','Sherlock Holmes','Mario',
    ];
    // Kid-friendly names, all verified to resolve to a photo (Wikipedia-human or DuckDuckGo).
    const KID_BANK = [
      'Spider-Man','Batman','Superman','Wonder Woman','Iron Man','Captain America',
      'Darth Vader','Yoda','Grogu','Optimus Prime',
      'Buzz Lightyear','Mickey Mouse','Minnie Mouse','Donald Duck','Goofy','Pluto',
      'Simba','Ariel','Cinderella','Snow White','Lightning McQueen','Baymax','Mike Wazowski',
      'Pikachu','Mario','Sonic the Hedgehog','Shrek','Kung Fu Panda','Winnie the Pooh',
      'Peppa Pig','Dora the Explorer','Scooby-Doo','Bugs Bunny',
      'Kermit the Frog','Miss Piggy','Elmo','Cookie Monster',
      'Hello Kitty','Barbie','Harry Potter',
    ];
    const norm = (s) => s.toLowerCase().replace(/[^a-z0-9]/g, '');
    const titleCase = (s) => s.replace(/\S+/g, (w) => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());

    // Lightweight "likely typo" heuristic (mirrors src/logic.ts nameWarning).
    const NUMBER_WARNING = 'has a number — typo?';
    function nameWarning(raw) {
      const text = (raw || '').trim();
      if (text.length === 0) return 'empty';
      if (text.length < 2) return 'too short';
      if (/\d/.test(text)) return NUMBER_WARNING; // advisory only — plenty of names have numbers
      const letters = text.replace(/[^a-zA-Z]/g, '');
      if (letters.length >= 3 && !/[aeiouy]/i.test(letters)) return 'no vowels — typo?';
      if (/(.)\1\1/.test(text)) return 'repeated letters — typo?';
      return null;
    }
    // True only for warnings that should BLOCK submission (numbers just flag).
    function nameBlocks(raw) { const w = nameWarning(raw); return !!w && w !== NUMBER_WARNING; }
    function editDistance(a, b) {
      const m = a.length, n = b.length;
      if (!m) return n; if (!n) return m;
      let prev = Array.from({ length: n + 1 }, (_, i) => i);
      let cur = new Array(n + 1).fill(0);
      for (let i = 1; i <= m; i++) {
        cur[0] = i;
        for (let j = 1; j <= n; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + cost);
        }
        [prev, cur] = [cur, prev];
      }
      return prev[n];
    }
    // Browser fetch to the Wikipedia API needs origin=* (for CORS); the browser supplies its
    // own User-Agent, so no 403 and no custom header (which browsers forbid anyway).
    async function wikiSearch(q, limit, fuzzy) {
      try {
        const query = fuzzy ? q.split(/\s+/).map((w) => w + '~').join(' ') : q;
        const url = 'https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*' +
          '&list=search&srinfo=suggestion&srprop=&srlimit=' + limit + '&srsearch=' + encodeURIComponent(query);
        const res = await fetch(url);
        const data = await res.json();
        return {
          titles: (data?.query?.search ?? []).map((r) => r.title).filter(Boolean),
          suggestion: data?.query?.searchinfo?.suggestion || null,
        };
      } catch { return { titles: [], suggestion: null }; }
    }
    async function suggestSpelling(name) {
      const q = (name || '').trim();
      if (q.length < 3) return [];
      const nq = norm(q);
      const maxDist = Math.max(2, Math.floor(nq.length * 0.4));
      const rank = (cands) => {
        const seen = new Set();
        return cands
          .map((t) => ({ t: titleCase(t), d: editDistance(nq, norm(t)) }))
          .filter(({ t, d }) => { const k = norm(t); if (d <= 0 || d > maxDist || seen.has(k)) return false; seen.add(k); return true; })
          .sort((a, b) => a.d - b.d).map((x) => x.t).slice(0, 3);
      };
      const plain = await wikiSearch(q, 6, false);
      if (plain.titles.some((t) => norm(t) === nq)) return [];
      const fromPlain = rank([...(plain.suggestion ? [plain.suggestion] : []), ...plain.titles]);
      if (fromPlain.length) return fromPlain;
      const { titles } = await wikiSearch(q, 6, true);
      if (titles.some((t) => norm(t) === nq)) return [];
      return rank(titles);
    }
    async function resolveByDescription(desc) {
      const q = (desc || '').trim();
      if (q.length < 3) return [];
      const { titles } = await wikiSearch(q, 8, false);
      const bad = /(^list of |\(disambiguation\)|\(surname\)|^index of )/i;
      const seen = new Set();
      return titles.filter((t) => !bad.test(t) && !seen.has(norm(t)) && (seen.add(norm(t)), true)).slice(0, 4);
    }
    // ---- Kid-Mode photo lookup (browser): mirrors the app's getCelebrityImage ----
    const imgCache = new Map();
    const removedPhotos = new Set(); // names the guest removed a wrong photo for (sent to host as noPhoto)
    async function jget(url) { try { const r = await fetch(url); return await r.json(); } catch { return null; } }
    async function isHuman(qid) {
      const d = await jget(`https://www.wikidata.org/w/api.php?action=wbgetentities&ids=${qid}&props=claims&format=json&origin=*`);
      const claims = d?.entities?.[qid]?.claims?.P31 ?? [];
      return claims.some((c) => c?.mainsnak?.datavalue?.value?.id === 'Q5');
    }
    async function imgFromWikipedia(name) {
      const d = await jget('https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages|pageprops&ppprop=wikibase_item&piprop=thumbnail&pithumbsize=300&generator=search&gsrlimit=8&gsrsearch=' + encodeURIComponent(name.trim()));
      const pages = d?.query?.pages; if (!pages) return null;
      const arr = Object.values(pages).sort((a, b) => (a.index ?? 0) - (b.index ?? 0));
      const lower = name.trim().toLowerCase();
      const isLogo = (u) => /logo|\.svg/i.test(u);
      const m = (t) => { const tl = String(t).toLowerCase(); return tl === lower || tl.startsWith(lower + ' ('); };
      const pick = arr.find((p) => p?.thumbnail?.source && !isLogo(p.thumbnail.source) && m(p.title));
      if (!pick) return null;
      const qid = pick.pageprops?.wikibase_item;
      if (!qid || !(await isHuman(qid))) return null;
      return pick.thumbnail.source;
    }
    async function imgFromDuckDuckGo(name) {
      const d = await jget('https://api.duckduckgo.com/?format=json&no_html=1&skip_disambig=1&t=celebrities&q=' + encodeURIComponent(name.trim()));
      let img = d?.Image || ''; if (!img) return null;
      if (img.startsWith('/')) img = 'https://duckduckgo.com' + img;
      return img || null;
    }
    async function getCelebrityImage(name) {
      const key = name.trim().toLowerCase(); if (!key) return null;
      if (removedPhotos.has(key)) return null; // guest removed this photo
      if (imgCache.has(key)) return imgCache.get(key);
      const img = (await imgFromWikipedia(name)) || (await imgFromDuckDuckGo(name)) || null;
      imgCache.set(key, img);
      return img;
    }

    // Full-screen photo zoom with a "remove wrong photo" option.
    function openZoom(url, name, onRemove) {
      const ov = document.createElement('div');
      ov.className = 'zoomov';
      ov.innerHTML =
        '<img src="' + url + '" class="zoomimg" alt="" />' +
        '<div class="zoomname">' + esc(name) + '</div>' +
        '<div class="note" style="text-align:center">Not the right person? Remove it so Kid Mode shows the word instead.</div>' +
        '<button class="submit" id="zoomrm" style="background:#ff6b6b;color:#2b0000">🗑 Remove photo</button>' +
        '<button class="find alt" id="zoomclose">Close</button>';
      document.body.appendChild(ov);
      ov.querySelector('#zoomrm').onclick = () => { onRemove(); ov.remove(); };
      ov.querySelector('#zoomclose').onclick = () => ov.remove();
    }

    function currentValues() { return [...document.querySelectorAll('.celeb')].map((e) => e.value.trim()).filter(Boolean); }
    function firstEmptyInput() { return [...document.querySelectorAll('.celeb')].find((e) => !e.value.trim()); }

    // ---------- UI ----------
    if (!room) {
      wrap.innerHTML = '<div class="card">No room code — scan the QR shown on the host’s screen.</div>';
    } else {
      buildForm();
    }

    function buildForm() {
      let team = 0;
      wrap.innerHTML = `
        <details class="card">
          <summary>ℹ️ How to play &amp; name tips</summary>
          <div class="dim" style="margin-top:10px;line-height:1.5">
            <p><b>Celebrities</b> — two teams, three rounds using the same bowl of names each round:
            <b>R1</b> describe with any words · <b>R2</b> one word only · <b>R3</b> act it out.</p>
            <p><b>Good names:</b> people or characters <i>everyone here</i> will recognize — actors,
            musicians, athletes, cartoon characters, historical figures. Use full names
            (e.g. "Sonic the Hedgehog", not "Sonic").</p>
            <p><b>Avoid:</b> obscure or private people, inside jokes, or anyone the other team won't know.</p>
          </div>
        </details>
        <div class="card">
          <label>Your name</label>
          <input id="name" placeholder="Your name" />
          <label>Your team</label>
          <div class="teams">
            <div class="team sel-a" id="t0">${teamAName}</div>
            <div class="team" id="t1">${teamBName}</div>
          </div>
        </div>
        <div class="card">
          <label>Your celebrities</label>
          <div id="celebs"></div>
          <div class="helper">
            <button class="link" id="descToggle">can't remember the name?</button>
            <button class="link" id="idea">need an idea?</button>
          </div>
          <div class="descbox" id="descBox" style="display:none">
            <div class="note" style="margin-bottom:8px">Describe it and I'll find the name — e.g. "Bluey's mom", "BYU mascot".</div>
            <div class="descrow">
              <input id="descInput" placeholder="Describe the person or character" />
              <button class="find" id="descFind">Find</button>
            </div>
            <div id="descResults"></div>
          </div>
          <div class="descbox" id="ideaBox" style="display:none">
            <div class="note" style="margin-bottom:8px">What kind of name?</div>
            <div class="descrow">
              <button class="find" id="ideaKid">Kid-friendly 👶</button>
              <button class="find alt" id="ideaAny">Any celebrity</button>
            </div>
          </div>
        </div>
        <button class="submit" id="send">Submit</button>
        <div class="dim" style="text-align:center;margin-top:8px">Room ${room}</div>`;

      const celebs = document.getElementById('celebs');

      // Build one celebrity row: thumbnail + input + its own spell-check / photo-status area.
      function addRow(value = '') {
        const row = document.createElement('div');
        const fieldRow = document.createElement('div'); fieldRow.className = 'fieldrow';
        const thumb = document.createElement('div'); thumb.className = 'thumb'; thumb.textContent = '📷';
        const input = document.createElement('input');
        input.className = 'celeb';
        input.placeholder = 'Celebrity ' + (celebs.children.length + 1);
        input.setAttribute('autocapitalize', 'words');
        input.value = value;
        const note = document.createElement('div'); // warning / photo status / "did you mean" chips
        const setThumb = (url, loading) => {
          if (url) { thumb.textContent = ''; thumb.style.backgroundImage = `url("${url}")`; thumb.classList.add('has'); }
          else { thumb.style.backgroundImage = ''; thumb.classList.remove('has'); thumb.textContent = loading ? '…' : '📷'; }
        };
        input.addEventListener('input', () => { note.innerHTML = ''; input.classList.remove('bad'); if (childMode) setThumb(null); });
        input.addEventListener('blur', async () => {
          note.innerHTML = ''; if (childMode) setThumb(null);
          const text = input.value.trim();
          if (!text) { input.classList.remove('bad'); return; }
          const w = nameWarning(text);
          if (w && nameBlocks(text)) { input.classList.add('bad'); note.innerHTML = `<div class="warn">${w}</div>`; return; }
          input.classList.remove('bad');
          const advisory = w ? `<div class="warn">${w}</div>` : ''; // number flag — shown but not blocking
          note.innerHTML = advisory + '<div class="note">checking…</div>'; if (childMode) setThumb(null, true);
          // Only run the (network) photo lookup for child-mode games.
          const [corr, img] = await Promise.all([
            suggestSpelling(text),
            childMode ? getCelebrityImage(text) : Promise.resolve(null),
          ]);
          if (input.value.trim() !== text) return; // changed while we waited
          note.innerHTML = advisory;
          if (childMode) {
            setThumb(img);
            if (img) {
              thumb.style.cursor = 'pointer';
              thumb.onclick = () => openZoom(img, text, () => { removedPhotos.add(text.toLowerCase()); setThumb(null); thumb.onclick = null; });
            } else {
              thumb.onclick = null;
              const n = document.createElement('div'); n.className = 'note';
              n.textContent = 'No photo — Kid Mode will skip this for young readers.';
              note.appendChild(n);
            }
          }
          if (corr.length) {
            const cr = document.createElement('div'); cr.className = 'chiprow';
            cr.innerHTML = '<span class="note">Did you mean:</span>';
            corr.forEach((s) => {
              const c = document.createElement('button'); c.className = 'chip'; c.textContent = s;
              c.onclick = () => { input.value = s; input.dispatchEvent(new Event('blur')); };
              cr.appendChild(c);
            });
            note.appendChild(cr);
          }
        });
        if (childMode) fieldRow.appendChild(thumb);
        fieldRow.appendChild(input);
        row.appendChild(fieldRow); row.appendChild(note);
        celebs.appendChild(row);
        return input;
      }
      for (let i = 0; i < 5; i++) addRow();

      // Fill the first empty celebrity slot (or add a row). Defined here so it can see addRow.
      function fillName(text) {
        let el = firstEmptyInput();
        if (!el) el = addRow();
        el.value = text;
        el.dispatchEvent(new Event('blur'));
      }

      document.getElementById('t0').onclick = () => { team = 0; document.getElementById('t0').classList.add('sel-a'); document.getElementById('t1').classList.remove('sel-b'); };
      document.getElementById('t1').onclick = () => { team = 1; document.getElementById('t1').classList.add('sel-b'); document.getElementById('t0').classList.remove('sel-a'); };

      // "need an idea?" — ask kid-friendly vs any, then fill from the chosen bank.
      const ideaBox = document.getElementById('ideaBox');
      document.getElementById('idea').onclick = () => { ideaBox.style.display = ideaBox.style.display === 'none' ? 'block' : 'none'; };
      const fillFrom = (bank) => {
        const used = new Set(currentValues().map((n) => n.toLowerCase()));
        const pool = bank.filter((n) => !used.has(n.toLowerCase()));
        if (pool.length) fillName(pool[Math.floor(Math.random() * pool.length)]);
      };
      document.getElementById('ideaKid').onclick = () => fillFrom(KID_BANK);
      document.getElementById('ideaAny').onclick = () => fillFrom(CELEBRITY_BANK);

      // "can't remember the name?" — describe → candidate chips.
      const descBox = document.getElementById('descBox');
      const descInput = document.getElementById('descInput');
      const descFind = document.getElementById('descFind');
      const descResults = document.getElementById('descResults');
      document.getElementById('descToggle').onclick = () => { descBox.style.display = descBox.style.display === 'none' ? 'block' : 'none'; };
      async function runResolve() {
        const q = descInput.value.trim();
        if (q.length < 3) return;
        descFind.disabled = true; descResults.innerHTML = '<div class="note">searching…</div>';
        const res = await resolveByDescription(q);
        descFind.disabled = false;
        descResults.innerHTML = '';
        if (!res.length) { descResults.innerHTML = '<div class="note">No match found — try rewording, or type the name directly.</div>'; return; }
        const cr = document.createElement('div'); cr.className = 'chiprow';
        cr.innerHTML = '<span class="note">Tap to use:</span>';
        res.forEach((s) => {
          const c = document.createElement('button'); c.className = 'chip'; c.textContent = s;
          c.onclick = () => { fillName(s); descInput.value = ''; descResults.innerHTML = ''; descBox.style.display = 'none'; };
          cr.appendChild(c);
        });
        descResults.appendChild(cr);
      }
      descFind.onclick = runResolve;
      descInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') runResolve(); });

      // Submit
      document.getElementById('send').onclick = async () => {
        const name = (document.getElementById('name').value || '').trim();
        const celebrities = currentValues();
        if (!name || celebrities.length === 0) { alert('Enter your name and at least one celebrity.'); return; }
        const junk = celebrities.find((n) => nameBlocks(n));
        if (junk) { alert(`"${junk}" looks like a typo (${nameWarning(junk)}). Fix it or re-enter before sending.`); return; }
        const btn = document.getElementById('send'); btn.disabled = true; btn.textContent = 'Sending…';
        try {
          const noPhoto = celebrities.filter((n) => removedPhotos.has(n.trim().toLowerCase()));
          await addDoc(collection(db, 'rooms', room, 'submissions'), { name, team, celebrities, noPhoto, at: serverTimestamp() });
          wrap.innerHTML =
            '<div class="ok"><div class="big">✅ Sent!</div>' +
            '<div class="dim" style="margin-bottom:20px">Your names are in.</div>' +
            '<button class="submit" id="again">➕ Add another player</button>' +
            '<div class="dim" style="margin-top:10px">…or just close this page.</div></div>';
          document.getElementById('again').onclick = () => buildForm(); // same room — no rescan needed
        } catch (e) {
          btn.disabled = false; btn.textContent = 'Submit';
          alert('Could not send — check your internet and try again.');
        }
      };
    }
  </script>
</body>
</html>
